name: kigali_city_services
description: Kigali City Services & Places Directory

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0

  # State Management
  provider: ^6.1.2

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  url_launcher: ^6.2.5

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
